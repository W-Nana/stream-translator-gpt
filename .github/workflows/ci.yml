name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[webui]" pytest yapf
      - name: Compile Python files
        run: python -m compileall -q stream_translator_gpt webui tests
      - name: Run tests
        run: pytest
      - name: Check formatting
        run: yapf --style '{based_on_style: google, column_limit: 120, allow_multiline_lambdas: True}' --recursive --diff stream_translator_gpt webui tests
